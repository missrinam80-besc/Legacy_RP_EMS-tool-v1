<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kostencalculator</title>

  <link rel="stylesheet" href="../../assets/styles/theme.css" />
  <link rel="stylesheet" href="../../assets/styles/base.css" />
  <link rel="stylesheet" href="../../assets/styles/layout.css" />
  <link rel="stylesheet" href="../../assets/styles/components.css" />
  <link rel="stylesheet" href="../../assets/styles/utilities.css" />
</head>
<body>
  <main class="page-container">
    <section class="panel">
      <h1 id="toolTitle">Kostencalculator</h1>
      <p id="toolDescription" class="text-soft"></p>
    </section>

    <section class="panel mt-2">
      <form id="costForm">
        <div class="form-grid">
          <div class="form-field">
            <label for="patientName">Patiënt</label>
            <input class="form-input" id="patientName" type="text" />
          </div>

          <div class="form-field">
            <label for="staffName">Behandelaar</label>
            <input class="form-input" id="staffName" type="text" />
          </div>
        </div>

        <div class="mt-2">
          <h2 class="mt-0">Selecteer behandelingen</h2>
          <p class="text-soft">
            Vink één of meerdere onderdelen aan. De tool berekent automatisch het totaal.
          </p>
        </div>

        <div id="itemsContainer" class="mt-2"></div>

        <div class="button-row">
          <button type="submit" class="btn btn-primary">Bereken totaal</button>
          <button type="button" class="btn btn-secondary" id="resetBtn">Leegmaken</button>
          <button type="button" class="btn btn-secondary" id="copyBtn">Kopieer samenvatting</button>
          <button type="button" class="btn btn-secondary" id="downloadBtn">Download .txt</button>
        </div>
      </form>

      <div id="statusBox" class="status-box hidden mt-2"></div>
    </section>

    <section class="output-card mt-2">
      <h2>Kostensamenvatting</h2>
      <textarea id="output" class="form-textarea" readonly></textarea>
    </section>
  </main>

  <script src="../../assets/scripts/core.js"></script>
  <script src="../../assets/scripts/ui.js"></script>
  <script src="../../assets/scripts/export.js"></script>
  <script src="app.js"></script>
</body>
</html>
