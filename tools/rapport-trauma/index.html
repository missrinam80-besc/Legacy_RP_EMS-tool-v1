<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trauma Rapport</title>

  <link rel="stylesheet" href="../../assets/styles/theme.css" />
  <link rel="stylesheet" href="../../assets/styles/base.css" />
  <link rel="stylesheet" href="../../assets/styles/layout.css" />
  <link rel="stylesheet" href="../../assets/styles/components.css" />
  <link rel="stylesheet" href="../../assets/styles/utilities.css" />
</head>
<body>
  <main class="page-container">
    <section class="panel">
      <h1 id="toolTitle">Trauma Rapport</h1>
      <p id="toolDescription" class="text-soft">
        Genereer een gestructureerd trauma-rapport.
      </p>
    </section>

    <section class="panel mt-2">
      <form id="reportForm">
        <div class="form-grid">
          <div class="form-field">
            <label for="patientName">Patiënt / slachtoffer</label>
            <input class="form-input" id="patientName" name="patientName" type="text" />
          </div>

          <div class="form-field">
            <label for="staffName">Behandelaar</label>
            <input class="form-input" id="staffName" name="staffName" type="text" />
          </div>

          <div class="form-field">
            <label for="injuryType">Type letsel</label>
            <select class="form-select" id="injuryType" name="injuryType">
              <option value="">Kies een optie</option>
            </select>
          </div>

          <div class="form-field">
            <label for="severity">Ernst</label>
            <select class="form-select" id="severity" name="severity">
              <option value="">Kies een optie</option>
            </select>
          </div>
        </div>

        <div class="form-field mt-2">
          <label for="treatment">Uitgevoerde behandeling</label>
          <textarea class="form-textarea" id="treatment" name="treatment"></textarea>
        </div>

        <div class="form-field mt-2">
          <label for="notes">Observaties / bijzonderheden</label>
          <textarea class="form-textarea" id="notes" name="notes"></textarea>
        </div>

        <div class="button-row">
          <button type="submit" class="btn btn-primary">Rapport opbouwen</button>
          <button type="button" class="btn btn-secondary" id="resetBtn">Leegmaken</button>
          <button type="button" class="btn btn-secondary" id="copyBtn">Kopiëren</button>
          <button type="button" class="btn btn-secondary" id="downloadBtn">Download .txt</button>
        </div>
      </form>

      <div id="statusBox" class="status-box hidden mt-2"></div>
    </section>

    <section class="output-card mt-2">
      <h2>Gegenereerd rapport</h2>
      <textarea id="reportOutput" class="form-textarea" readonly></textarea>
    </section>
  </main>

  <script src="../../assets/scripts/core.js"></script>
  <script src="../../assets/scripts/ui.js"></script>
  <script src="../../assets/scripts/export.js"></script>
  <script src="app.js"></script>
</body>
</html>
