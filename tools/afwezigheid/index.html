<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Afwezigheidsmelding</title>

  <link rel="stylesheet" href="../../assets/styles/theme.css" />
  <link rel="stylesheet" href="../../assets/styles/base.css" />
  <link rel="stylesheet" href="../../assets/styles/layout.css" />
  <link rel="stylesheet" href="../../assets/styles/components.css" />
  <link rel="stylesheet" href="../../assets/styles/utilities.css" />
</head>
<body>
  <main class="page-container">
    <section class="panel">
      <h1 id="toolTitle">Afwezigheidsmelding</h1>
      <p id="toolDescription" class="text-soft"></p>
    </section>

    <section class="panel mt-2">
      <form id="absenceForm">
        <div class="form-grid form-grid--custom">
          <div class="form-field">
            <label for="staffSelect">Medewerker</label>
            <select class="form-select" id="staffSelect">
              <option value="">Laden...</option>
            </select>
          </div>

            <!-- RIJ 1: Read-only user info -->
            <div class="form-row form-row--3">
              <div class="form-field">
                <label>Naam</label>
                <input type="text" id="naam" class="form-input readonly" readonly />
              </div>
          
              <div class="form-field">
                <label>Roepnummer</label>
                <input type="text" id="roepnummer" class="form-input readonly" readonly />
              </div>
          
              <div class="form-field">
                <label>Rang</label>
                <input type="text" id="rang" class="form-input readonly" readonly />
              </div>
            </div>
          
            <!-- RIJ 2: Datums -->
            <div class="form-row form-row--2">
              <div class="form-field">
                <label for="begindatum">Begindatum</label>
                <input type="date" id="begindatum" class="form-input" />
              </div>
          
              <div class="form-field">
                <label for="einddatum">Einddatum</label>
                <input type="date" id="einddatum" class="form-input" />
              </div>
            </div>

            <!-- RIJ 3: Reden -->
            <div class="form-row form-row--1">
              <div class="form-field">
                <label for="reden">Reden</label>
                <select id="reden" class="form-select">
                  <option value="">Selecteer reden</option>
                  <option value="verlof">Verlof</option>
                  <option value="ziekte">Ziekte</option>
                  <option value="andere">Andere</option>
                </select>
              </div>
            </div>
          
            <!-- Extra toelichting -->
            <div class="form-row form-row--1">
              <div class="form-field">
                <label for="toelichting">Toelichting</label>
                <textarea id="toelichting" class="form-textarea"></textarea>
              </div>
            </div>
        </div>
        <div class="button-row">
          <button type="submit" class="btn btn-primary">Melding opbouwen</button>
          <button type="button" class="btn btn-secondary" id="resetBtn">Leegmaken</button>
          <button type="button" class="btn btn-secondary" id="copyBtn">Kopiëren</button>
        </div>
      </form>

      <div id="statusBox" class="status-box hidden mt-2"></div>
    </section>

    <section class="output-card mt-2">
      <h2>Bericht</h2>
      <textarea id="output" class="form-textarea" readonly></textarea>
    </section>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbw2kNYykn-uWDfNSlbIlmFaM65lhw3bb-AlEndYbqde9muCBhiPH8IaziM203GxArPTuQ/exec';
  </script>
  <script src="../../assets/scripts/core.js"></script>
  <script src="../../assets/scripts/ui.js"></script>
  <script src="../../assets/scripts/export.js"></script>
  <script src="../../assets/scripts/ems-staff-service.js"></script>
  <script src="app.js"></script>
</body>
</html>
