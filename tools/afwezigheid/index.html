<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Afwezigheidsmelding | EMS Tools</title>

  <link rel="stylesheet" href="../../assets/styles/theme.css" />
  <link rel="stylesheet" href="../../assets/styles/base.css" />
  <link rel="stylesheet" href="../../assets/styles/layout.css" />
  <link rel="stylesheet" href="../../assets/styles/components.css" />
  <link rel="stylesheet" href="../../assets/styles/utilities.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <img
        src="../../assets/images/Banner.png"
        alt="Pillbox Hill Medical Center"
        class="site-banner"
      />
    </header>

    <main class="page-container">
      <div class="tool-nav">
        <a href="../../index.html">← Terug naar EMS Tools Hub</a>
      </div>

      <section class="tool-section">
        <div class="panel">
          <div class="section-heading">
            <div>
              <h1 id="toolTitle">Afwezigheidsmelding</h1>
              <p id="toolDescription">
                Meld afwezigheden en stuur ze door naar Discord.
              </p>
            </div>
          </div>

          <div id="statusBox" class="status-box status-info" hidden></div>

          <form id="absenceForm">
            <div class="tool-form-layout">
              <!-- LINKERKOLOM: invoervelden -->
              <div class="tool-form-column">
                <div class="form-field">
                  <label for="staffSelect">Medewerker</label>
                  <select id="staffSelect" class="form-select">
                    <option value="">Selecteer een medewerker</option>
                  </select>
                </div>

                <div class="form-row form-row--3">
                  <div class="form-field">
                    <label for="name">Naam</label>
                    <input type="text" id="name" class="form-input readonly" readonly />
                  </div>

                  <div class="form-field">
                    <label for="callSign">Roepnummer</label>
                    <input type="text" id="callSign" class="form-input readonly" readonly />
                  </div>

                  <div class="form-field">
                    <label for="role">Rang</label>
                    <input type="text" id="role" class="form-input readonly" readonly />
                  </div>
                </div>

                <div class="form-row form-row--2">
                  <div class="form-field">
                    <label for="startDate">Begindatum</label>
                    <input type="date" id="startDate" class="form-input" />
                  </div>

                  <div class="form-field">
                    <label for="endDate">Einddatum</label>
                    <input type="date" id="endDate" class="form-input" />
                  </div>
                </div>

                <div class="form-field">
                  <label for="reason">Reden</label>
                  <select id="reason" class="form-select">
                    <option value="">Kies een reden</option>
                  </select>
                </div>

                <div class="form-field">
                  <label for="details">Toelichting</label>
                  <textarea id="details" class="form-textarea"></textarea>
                </div>
              </div>

              <!-- RECHTERKOLOM: bericht -->
              <div class="tool-output-column">
                <div class="form-field output-field">
                  <label for="output">Bericht</label>
                  <textarea
                    id="output"
                    class="form-textarea output-textarea"
                    readonly
                  ></textarea>
                </div>
              </div>

              <!-- ONDERAAN: knoppen over volle breedte -->
              <div class="tool-actions-full">
                <div class="button-row">
                  <button type="submit" class="btn btn-primary">Opbouwen</button>
                  <button type="button" class="btn btn-secondary" id="copyBtn">Kopiëren</button>
                  <button type="button" class="btn btn-primary" id="sendBtn">Verzenden</button>
                  <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="../../assets/scripts/core.js"></script>
  <script src="../../assets/scripts/ui.js"></script>
  <script src="../../assets/scripts/export.js"></script>
  <script src="../../assets/scripts/ems-staff-service.js"></script>
  <script src="../../assets/scripts/discord-webhook.js"></script>
  <script src="./app.js"></script>
</body>
</html>
