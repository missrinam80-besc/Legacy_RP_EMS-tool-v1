<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMS Medewerkersportaal</title>
  <link rel="stylesheet" href="assets/styles/theme.css" />
  <link rel="stylesheet" href="assets/styles/base.css" />
  <link rel="stylesheet" href="assets/styles/layout.css" />
  <link rel="stylesheet" href="assets/styles/components.css" />
  <link rel="stylesheet" href="assets/styles/utilities.css" />
  <link rel="stylesheet" href="assets/styles/homepage.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <img src="assets/images/Banner.png" alt="EMS banner" class="site-banner" data-site-banner />
    </header>

    <main class="page-container">
      <section class="hero-card">
        <div class="hero-card__content">
          <h1>EMS Medewerkersportaal</h1>
          <p class="text-soft">
            Centrale toegang tot algemene informatie, aanvragen en de portalen van de verschillende EMS-afdelingen.
          </p>
        </div>
      </section>

      <section class="panel mt-2 quick-actions-panel">
        <div class="quick-actions-grid" data-module-context="home.quick" data-render-type="quick"></div>
      </section>

      <section class="panel mt-2 search-panel">
        <div class="form-field">
          <label for="toolSearch">Zoek een link of tool</label>
          <input
            class="form-input"
            id="toolSearch"
            type="text"
            placeholder="Zoek op naam, functie of categorie"
          />
        </div>

        <div id="hubStatus" class="visually-hidden" aria-hidden="true"></div>
      </section>

      <section class="tool-section" data-section="algemene-info">
        <div class="section-heading">
          <div>
            <h2>Algemene informatie</h2>
          </div>
        </div>
        <div class="tool-grid" data-module-context="home.algemene-info"></div>
      </section>

      <section class="tool-section" data-section="aanvragen">
        <div class="section-heading">
          <div>
            <h2>Aanvragen</h2>
          </div>
        </div>
        <div class="tool-grid" data-module-context="home.aanvragen"></div>
      </section>

      <section class="tool-section" data-section="afdelingen">
        <div class="section-heading">
          <div>
            <h2>Afdelingen</h2>
          </div>
        </div>
        <div class="tool-grid" data-module-context="home.afdelingen"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner page-container">
        <p>Laatste update info: <strong>02/04/2026</strong></p>
        <p>Versie: <strong>v1.0 live</strong></p>
        <p>Fout gevonden? <a href="#" class="footer-link">Meld een fout in de tool</a></p>
      </div>
    </footer>
  </div>

  <script src="assets/scripts/store-config.js"></script>
  <script src="assets/scripts/api-client.js"></script>
  <script src="assets/scripts/admin-store.js"></script>
  <script src="assets/scripts/theme-loader.js"></script>
  <script src="assets/scripts/module-registry.js"></script>
  <script src="assets/scripts/homepage.js"></script>
</body>
</html>
